:root {
  --bg: #0a0c10;
  --panel: #111318;
  --border: #1e2128;
  --accent: #00e5a0;
  --accent2: #0099ff;
  --text: #f0f2f5;
  --muted: #6b7280;
}

html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

.app { display: grid; grid-template-columns: 400px 1fr; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative; z-index: 10;
}
.sidebar::before {
  content: ''; position: absolute; top: -80px; left: -80px;
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* Header */
.header { padding: 22px 22px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px;
}
.logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 19px; letter-spacing: -0.5px; }
.logo-text span { color: var(--accent); }
.tagline { font-size: 11px; color: var(--muted); letter-spacing: 0.4px; }

/* Add form */
.add-form { padding: 18px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }

.section-title {
  font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--muted);
}

.field-group { display: flex; flex-direction: column; gap: 5px; }

.input-wrap { position: relative; }
.input-wrap .icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); font-size: 13px; pointer-events: none;
}

input[type="text"], input[type="number"], select {
  width: 100%; background: #161920; border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; padding: 10px 12px 10px 34px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]:focus, input[type="number"]:focus, select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.07);
}
select { appearance: none; cursor: pointer; }

/* Autocomplete */
.suggestions-box {
  position: absolute; top: calc(100% + 5px); left: 0; right: 0;
  background: #161920; border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; z-index: 9999; display: none;
  box-shadow: 0 14px 36px rgba(0,0,0,0.6);
}
.suggestions-box.active { display: block; }
.suggestion-item {
  padding: 10px 14px; font-size: 12px; color: var(--text); cursor: pointer;
  transition: background 0.13s; display: flex; align-items: flex-start; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: rgba(0,229,160,0.05); }
.s-main { font-weight: 500; line-height: 1.3; }
.s-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* Controls row */
.row-controls { display: grid; grid-template-columns: 1fr 76px; gap: 8px; }

/* Color swatches */
.swatch-row { display: flex; gap: 6px; flex-wrap: wrap; }
.color-swatch {
  width: 22px; height: 22px; border-radius: 6px; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.13s, border-color 0.13s;
}
.color-swatch:hover { transform: scale(1.18); }
.color-swatch.active { border-color: white; }

/* Status */
.status { font-size: 11px; padding: 8px 12px; border-radius: 8px; display: none; align-items: center; gap: 7px; }
.status.loading { display: flex; background: rgba(0,153,255,0.08); color: var(--accent2); border: 1px solid rgba(0,153,255,0.13); }
.status.error   { display: flex; background: rgba(255,80,80,0.08);  color: #ff7070;     border: 1px solid rgba(255,80,80,0.13); }
.spinner { width: 12px; height: 12px; border: 2px solid rgba(0,153,255,0.3); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Add button */
.btn-add {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0a0c10; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
  border: none; border-radius: 10px; padding: 11px; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-add:active { transform: translateY(0); }
.btn-add:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ── Locations list ── */
.locations-header {
  padding: 12px 22px 8px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.locations-count {
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
  background: rgba(0,229,160,0.12); color: var(--accent);
  border-radius: 20px; padding: 2px 9px; margin-left: 6px;
}
.btn-clear-all {
  font-size: 11px; color: var(--muted); background: none; border: none;
  cursor: pointer; padding: 4px 8px; border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}
.btn-clear-all:hover { color: #ff7070; background: rgba(255,80,80,0.07); }

.locations-list {
  flex: 1; overflow-y: auto; padding: 0 22px 14px; display: flex; flex-direction: column; gap: 7px;
}

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 30px 0; color: var(--muted); font-size: 12px; text-align: center;
}
.empty-state .e-icon { font-size: 28px; opacity: 0.35; }

/* Location card */
.loc-card {
  background: #161920; border: 1px solid var(--border); border-radius: 11px;
  overflow: hidden; transition: border-color 0.2s;
  animation: slideIn 0.22s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.loc-card:hover { border-color: #272c36; }

.loc-card-header {
  display: flex; align-items: center; gap: 9px; padding: 10px 12px;
  cursor: pointer; user-select: none;
}
.loc-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.loc-name { font-size: 12px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.loc-badge {
  font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700;
  padding: 2px 7px; border-radius: 20px; flex-shrink: 0;
}

.loc-actions { display: flex; gap: 3px; flex-shrink: 0; }
.loc-btn {
  width: 24px; height: 24px; border-radius: 6px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
  transition: background 0.13s; background: transparent; color: var(--muted);
}
.loc-btn:hover { background: rgba(255,255,255,0.06); }
.loc-btn.delete:hover { background: rgba(255,80,80,0.1); color: #ff7070; }
.loc-btn.focus-btn:hover { background: rgba(0,229,160,0.1); color: var(--accent); }

.loc-body { padding: 0 12px 10px; display: none; border-top: 1px solid var(--border); margin-top: 2px; padding-top: 10px; }
.loc-body.open { display: block; }

.loc-edit-row { display: grid; grid-template-columns: 1fr 70px; gap: 6px; margin-bottom: 8px; }
.loc-edit-row input, .loc-edit-row select { font-size: 12px; padding: 7px 10px; }
.loc-edit-row input { padding-left: 10px; }

.loc-color-row { display: flex; gap: 5px; flex-wrap: wrap; }
.loc-swatch {
  width: 20px; height: 20px; border-radius: 5px; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.12s, border-color 0.12s;
}
.loc-swatch:hover { transform: scale(1.2); }
.loc-swatch.active { border-color: white; }

/* Footer */
.sidebar-footer { padding: 10px 22px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); text-align: center; flex-shrink: 0; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Map ── */
#map { width: 100%; height: 100%; background: #0d0f14; }
.leaflet-container { background: #0d0f14; font-family: 'DM Sans', sans-serif; }
.leaflet-tile { filter: brightness(0.85) saturate(0.6) hue-rotate(180deg) invert(1); }
.leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }
.leaflet-control-attribution { background: rgba(10,12,16,0.7) !important; color: var(--muted) !important; font-size: 9px !important; }
.leaflet-control-attribution a { color: var(--accent) !important; }
.leaflet-popup-content-wrapper { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.leaflet-popup-tip { background: var(--panel); }
.leaflet-popup-content { font-family: 'DM Sans', sans-serif; font-size: 12px; line-height: 1.5; margin: 10px 14px; }

/* Fit-all button */
.btn-fit {
  position: absolute; bottom: 22px; right: 22px; z-index: 800;
  background: var(--panel); border: 1px solid var(--border); color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
  padding: 9px 14px; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.4);
}
.btn-fit:hover { border-color: var(--accent); color: var(--accent); }

@media (max-width: 700px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar { max-height: 55vh; overflow-y: auto; }
  html, body { overflow: auto; }
}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ═══════════════════════ MAP ═══════════════════════ */
const map = L.map('map', { center: [20, 0], zoom: 2 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19,
}).addTo(map);

/* ═══════════════════════ STATE ═══════════════════════ */
const COLORS = ['#00e5a0','#0099ff','#ff4d6d','#ffd166','#c77dff','#ff9f1c','#00c8ff','#ff6b6b'];
let locations   = [];
let idCounter   = 0;
let selectedColor = '#00e5a0';
let debounceTimer = null;

/* ═══════════════════════ ELEMENTS ═══════════════════════ */
const locationInput = document.getElementById('locationInput');
const suggestionsEl = document.getElementById('suggestions');
const radiusInput   = document.getElementById('radiusInput');
const unitSelect    = document.getElementById('unitSelect');
const addBtn        = document.getElementById('addBtn');
const statusLoading = document.getElementById('statusLoading');
const statusError   = document.getElementById('statusError');
const locationsList = document.getElementById('locationsList');
const emptyState    = document.getElementById('emptyState');
const locCount      = document.getElementById('locCount');
const clearAllBtn   = document.getElementById('clearAllBtn');
const fitAllBtn     = document.getElementById('fitAllBtn');
const colorPicker   = document.getElementById('colorPicker');

/* ═══════════════════════ HELPERS ═══════════════════════ */
function toMeters(v, unit) {
  if (unit === 'km') return v * 1000;
  if (unit === 'mi') return v * 1609.344;
  return v;
}
function areaKm2(m) { const r = m/1000; return (Math.PI*r*r).toFixed(2); }
function setStatus(s) {
  statusLoading.style.display = 'none'; statusError.style.display = 'none';
  if (s === 'loading') statusLoading.style.display = 'flex';
  if (s === 'error')   statusError.style.display   = 'flex';
}
function uid() { return ++idCounter; }
function shortName(n) { return n.split(', ').slice(0,2).join(', '); }
function fmtR(r, u) { return `${parseFloat(r).toFixed(1)} ${u}`; }
function autoColor() {
  const used = locations.map(l => l.color);
  return COLORS.find(c => !used.includes(c)) || COLORS[locations.length % COLORS.length];
}

/* ═══════════════════════ COLOR PICKER ═══════════════════════ */
colorPicker.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    colorPicker.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    selectedColor = sw.dataset.color;
  });
});

function preselectColor() {
  const c = autoColor();
  selectedColor = c;
  colorPicker.querySelectorAll('.color-swatch').forEach(sw =>
    sw.classList.toggle('active', sw.dataset.color === c));
}

/* ═══════════════════════ AUTOCOMPLETE ═══════════════════════ */
locationInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const q = locationInput.value.trim();
  if (q.length < 3) { suggestionsEl.classList.remove('active'); return; }
  debounceTimer = setTimeout(() => fetchSugg(q, suggestionsEl, r => {
    locationInput.value = r.display_name;
    suggestionsEl.classList.remove('active');
  }), 380);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) suggestionsEl.classList.remove('active');
});

async function fetchSugg(q, box, onSel) {
  try {
    const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`, { headers: {'Accept-Language':'es'} });
    const data = await res.json();
    renderSugg(data, box, onSel);
  } catch {}
}

function renderSugg(results, box, onSel) {
  box.innerHTML = '';
  if (!results.length) { box.classList.remove('active'); return; }
  results.forEach(r => {
    const el = document.createElement('div');
    el.className = 'suggestion-item';
    const parts = r.display_name.split(', ');
    el.innerHTML = `<span style="color:var(--accent);font-size:11px;margin-top:1px;flex-shrink:0;">📍</span>
      <div><div class="s-main">${parts.slice(0,2).join(', ')}</div>
      ${parts.length>2?`<div class="s-sub">${parts.slice(2).join(', ')}</div>`:''}</div>`;
    el.addEventListener('click', () => { onSel(r); box.classList.remove('active'); });
    box.appendChild(el);
  });
  box.classList.add('active');
}

/* ═══════════════════════ DRAW/REMOVE ═══════════════════════ */
function drawLayer(loc) {
  if (loc.circle) map.removeLayer(loc.circle);
  if (loc.marker) map.removeLayer(loc.marker);
  if (!loc.visible) return;

  const rm = toMeters(parseFloat(loc.radius), loc.unit);
  loc.circle = L.circle([loc.lat, loc.lng], {
    radius: rm, color: loc.color, fillColor: loc.color,
    fillOpacity: 0.09, weight: 2, dashArray: '6 4',
  }).addTo(map);

  loc.marker = L.circleMarker([loc.lat, loc.lng], {
    radius: 6, color: loc.color, fillColor: loc.color, fillOpacity: 1, weight: 2,
  }).addTo(map);

  loc.marker.bindPopup(`
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;">
      <span style="width:9px;height:9px;border-radius:50%;background:${loc.color};display:inline-block;flex-shrink:0;"></span>
      <strong style="font-size:12px;">${shortName(loc.name)}</strong>
    </div>
    <div style="font-size:11px;color:var(--muted);">Radio · ${fmtR(loc.radius, loc.unit)}</div>
    <div style="font-size:11px;color:var(--muted);">Área · ${areaKm2(rm)} km²</div>
  `, { maxWidth: 240 });
}

function removeLayer(loc) {
  if (loc.circle) { map.removeLayer(loc.circle); loc.circle = null; }
  if (loc.marker) { map.removeLayer(loc.marker); loc.marker = null; }
}

/* ═══════════════════════ FIT ALL ═══════════════════════ */
function fitAll() {
  const v = locations.filter(l => l.visible && l.circle);
  if (!v.length) return;
  const b = v.map(l => l.circle.getBounds()).reduce((a, b) => a.extend(b));
  map.fitBounds(b, { padding: [60, 60] });
}

/* ═══════════════════════ RENDER LIST ═══════════════════════ */
function renderList() {
  locCount.textContent = locations.length;
  emptyState.style.display = locations.length ? 'none' : 'flex';

  locationsList.querySelectorAll('.loc-card').forEach(card => {
    if (!locations.find(l => l.id == card.dataset.id)) card.remove();
  });

  locations.forEach(loc => {
    let card = locationsList.querySelector(`.loc-card[data-id="${loc.id}"]`);
    if (!card) {
      card = buildCard(loc);
      locationsList.insertBefore(card, emptyState);
    }
    syncCard(card, loc);
  });
}

function buildCard(loc) {
  const card = document.createElement('div');
  card.className = 'loc-card';
  card.dataset.id = loc.id;

  card.innerHTML = `
    <div class="loc-card-header">
      <span class="loc-dot"></span>
      <span class="loc-name"></span>
      <span class="loc-badge"></span>
      <div class="loc-actions">
        <button class="loc-btn toggle-btn" title="Mostrar/Ocultar">👁️</button>
        <button class="loc-btn focus-btn"  title="Centrar en mapa">🎯</button>
        <button class="loc-btn delete"     title="Eliminar">✕</button>
      </div>
    </div>
    <div class="loc-body">
      <div class="loc-edit-row">
        <select class="loc-unit-sel">
          <option value="km">Kilómetros</option>
          <option value="mi">Millas</option>
          <option value="m">Metros</option>
        </select>
        <input type="number" class="loc-radius-inp" min="0.01" step="0.1" />
      </div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;">Color</div>
      <div class="loc-color-row"></div>
    </div>`;

  // Colors
  const colorRow = card.querySelector('.loc-color-row');
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'loc-swatch';
    sw.dataset.color = c;
    sw.style.background = c;
    sw.addEventListener('click', () => {
      colorRow.querySelectorAll('.loc-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      loc.color = c;
      drawLayer(loc);
      syncCard(card, loc);
    });
    colorRow.appendChild(sw);
  });

  // Toggle expand
  card.querySelector('.loc-card-header').addEventListener('click', e => {
    if (e.target.closest('.loc-actions')) return;
    card.querySelector('.loc-body').classList.toggle('open');
  });

  // Toggle visibility
  card.querySelector('.toggle-btn').addEventListener('click', e => {
    e.stopPropagation();
    loc.visible = !loc.visible;
    drawLayer(loc); syncCard(card, loc);
  });

  // Focus
  card.querySelector('.focus-btn').addEventListener('click', e => {
    e.stopPropagation();
    if (loc.circle) map.fitBounds(loc.circle.getBounds(), { padding: [80,80] });
    if (loc.marker) loc.marker.openPopup();
  });

  // Delete
  card.querySelector('.delete').addEventListener('click', e => {
    e.stopPropagation();
    removeLayer(loc);
    locations = locations.filter(l => l.id !== loc.id);
    card.style.animation = 'none';
    card.style.transition = 'opacity .18s, transform .18s';
    card.style.opacity = '0'; card.style.transform = 'translateY(-4px)';
    setTimeout(() => { card.remove(); renderList(); }, 190);
  });

  // Radius edit
  card.querySelector('.loc-radius-inp').addEventListener('input', function() {
    loc.radius = parseFloat(this.value) || 0.1;
    drawLayer(loc); syncCard(card, loc);
  });

  // Unit edit
  card.querySelector('.loc-unit-sel').addEventListener('change', function() {
    loc.unit = this.value;
    drawLayer(loc); syncCard(card, loc);
  });

  return card;
}

function syncCard(card, loc) {
  card.querySelector('.loc-dot').style.background = loc.color;
  card.querySelector('.loc-name').textContent = shortName(loc.name);
  const badge = card.querySelector('.loc-badge');
  badge.textContent = fmtR(loc.radius, loc.unit);
  badge.style.background = loc.color + '20';
  badge.style.color = loc.color;

  card.querySelector('.loc-unit-sel').value = loc.unit;
  card.querySelector('.loc-radius-inp').value = loc.radius;
  card.querySelectorAll('.loc-swatch').forEach(sw =>
    sw.classList.toggle('active', sw.dataset.color === loc.color));

  const tb = card.querySelector('.toggle-btn');
  tb.style.opacity = loc.visible ? '1' : '0.38';
  card.style.opacity = loc.visible ? '1' : '0.52';
}

/* ═══════════════════════ ADD ═══════════════════════ */
addBtn.addEventListener('click', async () => {
  const q = locationInput.value.trim();
  if (!q) { document.getElementById('errorMsg').textContent = 'Escribe una dirección.'; setStatus('error'); return; }

  setStatus('loading'); addBtn.disabled = true;
  try {
    const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`, { headers: {'Accept-Language':'es'} });
    const data = await res.json();
    if (!data.length) throw new Error();

    const loc = {
      id: uid(),
      name: data[0].display_name,
      lat: parseFloat(data[0].lat),
      lng: parseFloat(data[0].lon),
      radius: parseFloat(radiusInput.value) || 1,
      unit: unitSelect.value,
      color: selectedColor,
      visible: true,
      circle: null, marker: null,
    };

    locations.push(loc);
    drawLayer(loc);
    renderList();
    setStatus(null);
    locationInput.value = '';
    fitAll();
    preselectColor();
  } catch {
    document.getElementById('errorMsg').textContent = 'No se encontró. Intenta con más detalle.';
    setStatus('error');
  } finally {
    addBtn.disabled = false;
  }
});

locationInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });

/* ═══════════════════════ CLEAR ALL ═══════════════════════ */
clearAllBtn.addEventListener('click', () => {
  locations.forEach(l => removeLayer(l));
  locations = [];
  locationsList.querySelectorAll('.loc-card').forEach(c => c.remove());
  renderList();
});

/* ═══════════════════════ FIT BTN ═══════════════════════ */
fitAllBtn.addEventListener('click', fitAll);

/* ═══════════════════════ INIT ═══════════════════════ */
renderList();
preselectColor();
</script>

</body>
